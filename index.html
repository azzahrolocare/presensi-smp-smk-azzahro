<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PRESENSI DIGITAL AZ-ZAHRO</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body { font-family: sans-serif; background:#121212; color:white; text-align:center; }
.btn { padding:10px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; }
.btn-hapus { background:#e74c3c; color:white; }
#reader { width:100%; max-width:300px; margin:auto; }
</style>
</head>

<body>

<h2>PRESENSI DIGITAL</h2>

<div id="reader"></div>

<br>

<button class="btn btn-hapus" onclick="tanyaHapusCache()">HAPUS CACHE</button>

<!-- POPUP KONFIRMASI -->
<div id="confirm-hapus-cache" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;">
    <div style="background:#1e1e1e; padding:20px; border-radius:15px;">
        <h3>Yakin hapus cache?</h3>
        <button onclick="batalHapusCache()" class="btn">Batal</button>
        <button onclick="konfirmasiHapusCache()" class="btn btn-hapus">Hapus</button>
    </div>
</div>

<script>
const dbName = "PresensiOfflineDB";
let db;

const request = indexedDB.open(dbName,1);
request.onupgradeneeded = e=>{
    db = e.target.result;
    db.createObjectStore("antrean",{keyPath:"id",autoIncrement:true});
};
request.onsuccess = e=> db = e.target.result;

// ================= SCANNER =================
const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text)=> {
        alert("SCAN: " + text);
    }
);

// ================= CACHE =================
function tanyaHapusCache(){
    document.getElementById('confirm-hapus-cache').style.display='flex';
}
function batalHapusCache(){
    document.getElementById('confirm-hapus-cache').style.display='none';
}
function konfirmasiHapusCache(){
    document.getElementById('confirm-hapus-cache').style.display='none';
    hapusCacheAman();
}

async function hapusCacheAman(){
    try{
        // cache
        if('caches' in window){
            const names = await caches.keys();
            for(let n of names) await caches.delete(n);
        }

        // indexedDB
        if(db) db.close();
        indexedDB.deleteDatabase(dbName);

        // notifikasi
        alert("CACHE BERHASIL DIHAPUS");

        location.reload();

    }catch(e){
        alert("GAGAL HAPUS CACHE");
    }
}
</script>

</body>
</html>
