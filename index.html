<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/png" href="https://github.com/masrahmat-id/presensi-smp-smk-azzahro/raw/main/icon-apk-presensi-azzahro.png">
    <link rel="apple-touch-icon" href="https://github.com/masrahmat-id/presensi-smp-smk-azzahro/raw/main/icon-apk-presensi-azzahro.png">
    <title>PRESENSI ONLINE SMP & SMK AZ-ZAHRO</title>
    
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #2ecc71;
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --header-font-size: 0.9rem;
            --logo-size: 65px;
        }

        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
        }

        html, body {
            height: 100%; margin: 0; padding: 0;
            overflow: hidden; background-color: var(--bg-body);
            position: fixed; width: 100%;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--text-main); transition: background 0.4s ease;
        }

        /* ANIMASI ELIPSIS */
        @keyframes ellipsis {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        .loading-dots::after {
            content: '';
            display: inline-block;
            width: 20px;
            text-align: left;
            animation: ellipsis 1.5s infinite;
        }

        .main-app {
            width: 100%; max-width: 400px;
            padding: 0 20px; box-sizing: border-box; text-align: center;
            display: flex; flex-direction: column; height: 100%;
            justify-content: center;
        }

        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .header-container img { width: var(--logo-size); height: var(--logo-size); object-fit: contain; }
        .header-container h3 { margin: 0; font-size: var(--header-font-size); line-height: 1.1; font-weight: 800; }

        .datetime-display { margin-bottom: 10px; font-weight: bold; font-size: 14px; text-transform: uppercase; }

        .controls-row { display: flex; gap: 10px; margin-bottom: 15px; }
        select, .btn-settings { background: var(--bg-card); color: var(--text-main); border: 2px solid var(--primary); border-radius: 15px; height: 50px; }
        select { flex-grow: 1; padding: 0 15px; font-weight: bold; font-size: 16px; }
        .btn-settings { width: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .scanner-box {
            width: 100%; background: #000; border-radius: 20px; border: 4px solid var(--primary); 
            position: relative; overflow: hidden; min-height: 450px; display: flex; align-items: center;
        }

        #reader { width: 100%; height: 100%; }
        #selection-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 20px;
        }

        .barcode-option { background: var(--primary); color: white; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; border: 2px solid white; }

        .last-scan-container { margin-top: 15px; width: 100%; }
        #last-name-display { width: 100%; height: 55px; background: var(--bg-card); border: 2px solid var(--primary); border-radius: 15px; color: var(--primary); text-align: center; font-weight: 800; font-size: 20px; outline: none; }

        #status-kirim {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; padding: 18px 15px; border-radius: 15px;
            z-index: 30000; display: none; background-color: var(--primary);
            color: white; border: 2px solid white; text-align: center; 
            font-weight: 800; font-size: 13px; white-space: pre-line;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* MODAL & ANTREAN */
        .btn-antrean-float {
            position: fixed; bottom: 85px; right: 15px; background: rgba(243, 156, 18, 0.2); 
            backdrop-filter: blur(8px); color: #f39c12; border: 1.5px solid #f39c12; padding: 8px 15px; 
            border-radius: 12px; z-index: 99; font-weight: 800; font-size: 11px; display: flex; flex-direction: column; align-items: center;
        }
        .btn-antrean-float.ada-data { background: #f39c12; color: white; border: 1.5px solid white; }

        #modal-antrean {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 20000; justify-content: center; align-items: center;
        }
        .modal-content-antrean {
            background: var(--bg-card); width: 90%; max-width: 360px; border-radius: 20px; 
            padding: 20px; border: 2px solid var(--primary); color: var(--text-main);
        }
        .progress-container { width: 100%; background: rgba(255,255,255,0.1); border-radius: 10px; height: 10px; margin: 15px 0; display: none; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
    </style>
</head>
<body data-theme="dark" onclick="toggleFullscreen()"> 
    
    <div id="status-kirim"></div>

    <button id="btn-float-offline" class="btn-antrean-float" onclick="bukaModalAntrean(event)">
        <span>OFFLINE</span>
        <span id="label-jumlah-antrean">0</span>
    </button>

    <div id="modal-antrean">
        <div class="modal-content-antrean" onclick="event.stopPropagation()">
            <h3 style="margin-top:0; color:var(--primary); text-align:center;">ANTREAN OFFLINE</h3>
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:15px 0;">
            
            <div id="loading-text" style="display:none; font-size: 12px; color: var(--primary); text-align: center; font-weight: bold;">MENGIRIM: <span id="current-send">0</span> / <span id="total-send">0</span></div>
            <div class="progress-container" id="prog-cont"><div class="progress-bar" id="prog-bar"></div></div>

            <div id="daftar-item-antrean" style="margin-bottom:20px; max-height:300px; overflow-y:auto;"></div>
            
            <div style="display:flex; gap:10px;">
                <button onclick="kirimManual()" id="btn-kirim-manual" style="flex:1; background:var(--primary); color:white; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer; min-height: 45px;">KIRIM SEKARANG</button>
                <button onclick="tutupModalAntrean()" id="btn-tutup-antrean" style="flex:1; background:#7f8c8d; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">TUTUP</button>
            </div>
        </div>
    </div>

    <div class="main-app">  
        <div class="header-container">
            <img src="logo-smp-azzahro.png" alt="SMP">
            <h3 id="text-header">PRESENSI DIGITAL<br>SMP ISLAM AZ-ZAHRO<br>SMK AZ-ZAHRO</h3>
            <img src="logo-smk-azzahro.png" alt="SMK">
        </div>

        <div class="datetime-display" id="clock-display">MEMUAT...</div>

        <div class="controls-row">
            <select id="keterangan">
                <option value="" disabled selected>Pilih Keterangan</option>
                <option value="●">🟢 HADIR</option>
                <option value="I">🟡 IZIN</option>
                <option value="S">🔵 SAKIT</option>
                <option value="A">🔴 ALPA</option>
            </select>
            <div class="btn-settings">⚙</div>
        </div>

        <div class="scanner-box">
            <div id="reader"></div>
            <div id="selection-overlay"></div>
        </div>

        <div class="last-scan-container">
            <input type="text" id="last-name-display" placeholder="MENUNGGU SCAN..." readonly>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        const dbName = "PresensiOfflineDB";
        let db;
        const requestDB = indexedDB.open(dbName, 1);
        requestDB.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("antrean")) db.createObjectStore("antrean", { keyPath: "id", autoIncrement: true });
        };
        requestDB.onsuccess = (e) => { db = e.target.result; updateJumlahAntreanBadge(); };

        function updateStatusUI(pesan, warna) {
            const s = document.getElementById('status-kirim');
            s.innerText = pesan;
            s.style.backgroundColor = warna;
            s.style.display = "block";
            setTimeout(() => { s.style.display = "none"; }, 4000);
        }

        function updateJumlahAntreanBadge() {
            if (!db) return;
            const store = db.transaction(["antrean"], "readonly").objectStore("antrean");
            const req = store.count();
            req.onsuccess = () => {
                const jml = req.result;
                document.getElementById('label-jumlah-antrean').innerText = jml;
                const btn = document.getElementById('btn-float-offline');
                jml > 0 ? btn.classList.add('ada-data') : btn.classList.remove('ada-data');
            };
        }

        function bukaModalAntrean(e) {
            if(e) e.stopPropagation();
            document.getElementById('modal-antrean').style.display = 'flex';
            const container = document.getElementById('daftar-item-antrean');
            const store = db.transaction(["antrean"], "readonly").objectStore("antrean");
            store.getAll().onsuccess = (ev) => {
                const items = ev.target.result;
                container.innerHTML = items.length ? items.map(i => `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; margin-bottom:8px; border-left:4px solid #f39c12;"><strong>${i.nama}</strong><br><small>${i.keterangan}</small></div>`).join('') : "<p style='text-align:center; color:#999;'>Kosong</p>";
            };
        }

        function tutupModalAntrean() { document.getElementById('modal-antrean').style.display = 'none'; }

        async function kirimManual() {
            if (!navigator.onLine) {
                updateStatusUI("⚠️ ANDA MASIH OFFLINE!\nSILAKAN HUBUNGKAN KE INTERNET TERLEBIH DAHULU", "#e67e22");
                return;
            }

            const btnKirim = document.getElementById('btn-kirim-manual');
            const btnTutup = document.getElementById('btn-tutup-antrean');
            const progCont = document.getElementById('prog-cont');
            const progBar = document.getElementById('prog-bar');
            
            // AKTIFKAN ANIMASI ELIPSIS PADA TOMBOL
            btnKirim.disabled = true;
            btnKirim.style.opacity = "0.6";
            btnKirim.innerHTML = 'SEDANG MENGIRIM<span class="loading-dots"></span>';
            btnTutup.disabled = true;

            const store = db.transaction(["antrean"], "readonly").objectStore("antrean");
            store.getAll().onsuccess = async (e) => {
                const data = e.target.result;
                if (!data.length) return;

                progCont.style.display = 'block';
                document.getElementById('loading-text').style.display = 'block';
                document.getElementById('total-send').innerText = data.length;

                for (let i = 0; i < data.length; i++) {
                    document.getElementById('current-send').innerText = i + 1;
                    progBar.style.width = ((i + 1) / data.length * 100) + "%";
                    
                    // Simulasi Fetch ke Google Apps Script
                    await fetch('https://script.google.com/macros/s/AKfycbwCXbDTuaFkN7GlcXJxaFgDaKPEp2G9vySF1IKfWxUCTuEOCYt39nMmlEmI25pz4PSd/exec?nama=' + encodeURIComponent(data[i].nama) + '&keterangan=' + encodeURIComponent(data[i].keterangan), { mode: 'no-cors' });
                    
                    const delTx = db.transaction(["antrean"], "readwrite");
                    delTx.objectStore("antrean").delete(data[i].id);
                    await new Promise(r => setTimeout(r, 200));
                }

                updateJumlahAntreanBadge();
                updateStatusUI("🔄 SEMUA DATA TERKIRIM!", "#2ecc71");
                tutupModalAntrean();
                
                // Reset tombol
                btnKirim.disabled = false;
                btnKirim.style.opacity = "1";
                btnKirim.innerHTML = 'KIRIM SEKARANG';
                btnTutup.disabled = false;
            };
        }

        // ... Sisa fungsi jam, scanner, dll tetap sama ...
        function updateClock() {
            const now = new Date();
            document.getElementById('clock-display').innerText = now.toLocaleTimeString('id-ID');
        }
        setInterval(updateClock, 1000);

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
        }
    </script>
</body>
</html>
